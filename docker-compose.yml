version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: oj-mongo-prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: oj-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: oj-api-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/university_oj
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=supersecret_key_change_me_in_prod
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: oj-worker-prod
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb:27017/university_oj
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
      - redis

volumes:
  mongo-data:
  redis-data:
